<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Telemedicine Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f1f3f6;
      padding-bottom: 60px;
      background-image: url(
        https://static.vecteezy.com/system/resources/previews/016/084/083/non_2x/modern-blue-medical-wallpaper-futuristic-medical-icons-geometric-hexagon-shape-vector.jpg
      );
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* Top Navbar */
    .navbar {
      background-color: #0077b6;
      display: flex;
      align-items: center;
      justify-content: center; /* Center everything horizontally */
      gap: 50px; /* Space between logo and buttons */
      padding: 10px 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      color: white;
    }

    .navbar .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .auth-buttons {
      display: flex;
      gap: 10px;
    }

    .auth-buttons button {
      background-color: #0077b6;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Services List */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .service-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1000px;
      width: 100%;
    }

    .service {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .service h3 {
      margin: 10px 0;
      color: #0077b6;
    }

    .service button {
      background-color: #0077b6;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .service button:hover {
      background-color: #005f8a;
    }

    /* Bottom Navigation */
    .bottom-nav {
      background-color: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
      box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.1);
    }

    .bottom-nav button {
      background-color: #0077b6;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bottom-nav button:hover {
      background-color: #005f8a;
      transform: scale(1.1);
    }

    /* Link styles inside buttons */
    button a {
      color: white;
      text-decoration: none;
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Center the image */
    img {
      display: block;
      margin: 20px auto;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <!-- Top Navbar -->
  <div class="navbar">
    <div class="logo">Telemedicine Platform</div>
    <div class="auth-buttons">
      <button><a href="signup.html">Sign Up</a></button>
      <button><a href="login.html">Login</a></button>
    </div>
  </div>

  <!-- Image -->
  <img
    src="dct.jpg"
    width="500"
    alt="Test Image"
  />

  <!-- Service List -->
  <div class="container">
    <div class="service-list">
      <div class="service">
        <h3>Consult a Doctor</h3>
        <button><a href="file4.html">View</a></button>
      </div>
      <div class="service">
        <h3>Hospital Near Me</h3>
        <button><a href="11.html">View</a></button>
      </div>
      <div class="service">
        <h3>Online Prescription</h3>
        <button><a href="prescription.html">View</a></button>
      </div>
      <div class="service">
        <h3>AI suggestions</h3>
        <button><a href="aichatbox.html">View</a></button>
      </div>
      <div class="service">
        <h3>Lab Tests</h3>
        <button><a href="triler3.html">Click</a></button>
      </div>
      <div class="service">
        <h3>Health Checkups</h3>
        <button><a href="trile2.html">Click</a></button>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <button><a href="trile1.html">🏠 Home</a></button>
    <button><a href="appointement.html">📋 Appointments</a></button>
    <button><a href="profile.html">👤 Account</a></button>
  </div>

  <script>
    function toggleLogin() {
      alert("Login functionality coming soon!");
    }
  </script>
</body>
</html>
